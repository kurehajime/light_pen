name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: latest

      - name: Clone libultrahdr-wasm
        run: git clone https://github.com/MONOGRID/libultrahdr-wasm.git vendor/libultrahdr-wasm

      - name: Cache libjpeg-turbo wrap sources
        run: |
          mkdir -p vendor/libultrahdr-wasm/subprojects/packagecache
          curl -L -o vendor/libultrahdr-wasm/subprojects/packagecache/libjpeg-turbo-3.0.0.tar.gz \
            https://sourceforge.net/projects/libjpeg-turbo/files/3.0.0/libjpeg-turbo-3.0.0.tar.gz
          curl -L -o vendor/libultrahdr-wasm/subprojects/packagecache/libjpeg-turbo_3.0.0-5_patch.zip \
            https://wrapdb.mesonbuild.com/v2/libjpeg-turbo_3.0.0-5/get_patch

      - name: Build UltraHDR wasm
        run: make ultrahdr

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    if: github.event_name != 'workflow_dispatch' || github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
